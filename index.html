<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>高速公路隧道 · 照度检测系统</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #eef2f7;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 16px 12px 40px;
      color: #1e2f3c;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .title-wrapper {
      text-align: center;
      margin-bottom: 10px;
    }

    h1 {
      font-weight: 600;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #1e4b6e, #0f2c40);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; }
    }

    .wechat-warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
      border-radius: 40px;
      padding: 8px 14px;
      margin-bottom: 16px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      display: none;
    }

    .wechat-warning.show {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .info-rows {
      background: white;
      border-radius: 28px;
      padding: 14px 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .info-row label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #2c5a7a;
      min-width: 58px;
    }

    .info-input {
      flex: 1;
      border: 1px solid #cfdfed;
      background: #ffffff;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    .info-input:focus {
      border-color: #2c7cb6;
      box-shadow: 0 0 0 2px rgba(44, 124, 182, 0.1);
    }

    .hint-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .hint-text {
      font-size: 0.7rem;
      background: #e9f0f6;
      padding: 4px 12px;
      border-radius: 30px;
      color: #2c6b8f;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      background: white;
      border: 1px solid #cbdde9;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1e4b6e;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.96);
      background: #e3edf5;
    }

    .btn.capture {
      background: #2a6b4e;
      border-color: #1d533c;
      color: white;
    }

    .btn.excel {
      background: #1f7b4a;
      border-color: #15633b;
      color: white;
    }

    .btn.new-tunnel {
      background: #1f4e6e;
      border-color: #0e3850;
      color: white;
    }

    .projects-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: 16px 0 12px;
    }

    .project-card {
      background: white;
      border-radius: 28px;
      padding: 18px 14px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2edf5;
      transition: all 0.2s;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-name-input {
      font-weight: 700;
      font-size: 1.2rem;
      background: transparent;
      border: none;
      border-bottom: 2px dashed #b9d0e3;
      padding: 4px 0;
      width: 150px;
      outline: none;
      color: #103247;
    }

    .delete-section-btn {
      background: #f2f6fa;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      color: #8da3b7;
      transition: 0.2s;
    }

    .delete-section-btn:active {
      background: #e0eaf2;
      color: #b91c1c;
    }

    .rows-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }

    .data-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fbfdff;
      padding: 6px 4px;
      border-radius: 20px;
      border: 1px solid #e5eff7;
    }

    .row-inputs {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      flex: 1;
    }

    .input-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .input-cell label {
      font-size: 0.55rem;
      font-weight: 600;
      color: #547c9c;
      margin-bottom: 2px;
    }

    .input-cell input {
      width: 100%;
      padding: 8px 2px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1.5px solid #d7e3ef;
      border-radius: 16px;
      background: white;
      outline: none;
      transition: 0.1s;
    }

    .input-cell input:focus {
      border-color: #2c7cb6;
      box-shadow: 0 0 0 2px rgba(44, 124, 182, 0.2);
    }

    .row-delete-btn {
      background: #f3f7fc;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      color: #8aa3b9;
    }

    .add-row-btn {
      background: #f2f8fe;
      border: 1px dashed #8eb3cc;
      border-radius: 40px;
      padding: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #2c6f94;
      text-align: center;
      margin: 6px 0 10px;
      cursor: pointer;
      transition: 0.1s;
    }

    .add-row-btn:active {
      background: #e2eff9;
    }

    .surface-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 0 8px;
      padding-top: 4px;
    }

    .surface-selector label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #1e577c;
    }

    .surface-select {
      background: white;
      border: 1px solid #c9ddec;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.8rem;
    }

    .avg-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: baseline;
      background: #f3f9ff;
      padding: 10px 12px;
      border-radius: 40px;
      margin-top: 10px;
    }

    .avg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      padding: 4px 12px;
      border-radius: 50px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .avg-label {
      font-weight: 600;
      font-size: 0.75rem;
      color: #1b577b;
    }

    .avg-value {
      font-weight: 800;
      font-size: 1rem;
      color: #0c4769;
      min-width: 68px;
      text-align: center;
    }

    .info-icon {
      font-size: 0.75rem;
      cursor: help;
      background: #d9e6f2;
      border-radius: 50%;
      display: inline-flex;
      width: 16px;
      height: 16px;
      align-items: center;
      justify-content: center;
      margin-left: 3px;
      position: relative;
    }

    .tooltip-text {
      visibility: hidden;
      background: #1e3b5c;
      color: white;
      padding: 6px 12px;
      border-radius: 24px;
      position: absolute;
      font-size: 0.65rem;
      white-space: nowrap;
      z-index: 200;
      bottom: 150%;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
    }

    .info-icon:hover .tooltip-text,
    .info-icon:active .tooltip-text {
      visibility: visible;
      opacity: 1;
    }

    .action-bar {
      display: flex;
      justify-content: space-between;
      margin: 12px 0 10px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid #cfe0ed;
      font-size: 0.7rem;
      color: #6c8eaa;
    }

    .toast-message {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a3448;
      color: white;
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 2100;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .modal-box {
      background: white;
      border-radius: 32px;
      padding: 24px 20px;
      max-width: 320px;
      width: 85%;
      text-align: center;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-box h3 {
      font-size: 1.3rem;
      margin-bottom: 18px;
      color: #1f4868;
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-btn {
      background: #f0f6fd;
      border: none;
      border-radius: 60px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1f5375;
      cursor: pointer;
    }

    .modal-btn.excel { background: #1f7b4a; color: white; }
    .modal-btn.primary { background: #2a6b4e; color: white; }
    .modal-btn.all { background: #1f4e6e; color: white; }
    .modal-btn.skip { background: #cbdde9; color: #1e3b4e; }

    .modal-hint {
      font-size: 0.65rem;
      margin-top: 14px;
      color: #7b99b3;
    }
  </style>
</head>
<body>
<div class="container">
  <div id="captureArea">
    <div class="title-wrapper">
      <h1>🛣️ 隧道照度检测记录</h1>
    </div>

    <div id="wechatWarning" class="wechat-warning">⚠️ 微信内无法直接下载文件，请使用系统浏览器打开</div>

    <div class="info-rows">
      <div class="info-row">
        <label>🚇 隧道名称</label>
        <input type="text" id="tunnelNameInput" class="info-input" value="连城山隧道" placeholder="例: 秦岭隧道">
      </div>
      <div class="info-row">
        <label>📅 检测时间</label>
        <input type="text" id="measureTimeInput" class="info-input" placeholder="2025-06-15 14:30">
      </div>
      <div class="info-row">
        <label>🧑‍🔧 检测人员</label>
        <input type="text" id="inspectorNameInput" class="info-input" value="张工" placeholder="姓名">
      </div>
    </div>

    <div class="hint-row">
      <span class="hint-text"><span id="backupIcon">💾</span> 自动保存 · 上次备份 <span id="backupTime">--:--:--</span></span>
    </div>

    <div id="projectsContainer" class="projects-grid"></div>
  </div>

  <div class="action-bar">
    <div class="toolbar">
      <button class="btn" id="addSectionBtn">➕ 添加区段</button>
      <button class="btn new-tunnel" id="newTunnelBtn">📋 新建隧道</button>
    </div>
    <div class="toolbar">
      <button class="btn excel" id="exportExcelBtn">📎 导出Excel</button>
      <button class="btn capture" id="saveImageBtn">📸 保存为图片</button>
    </div>
  </div>

  <div class="footer-bar">
    <button class="btn" id="resetDefaultBtn">⟳ 恢复默认数据</button>
    <span class="author"> 作者：Geronimo</span>
  </div>
</div>

<div id="toast" class="toast-message"></div>
<div id="saveModal" class="modal-overlay" style="display: none;">
  <div class="modal-box">
    <h3>💡 保存当前隧道数据？</h3>
    <div class="modal-buttons">
      <button class="modal-btn excel" id="modalExcelBtn">📊 导出 Excel 并清空</button>
      <button class="modal-btn primary" id="modalImageBtn">🖼️ 导出图片 并清空</button>
      <button class="modal-btn all" id="modalAllBtn">📦 导出 Excel+图片 并清空</button>
      <button class="modal-btn skip" id="modalSkipBtn">🚀 直接新建隧道 (不保存)</button>
      <button class="modal-btn" id="modalCancelBtn">取消</button>
    </div>
    <div class="modal-hint">数据会先保存再开始全新隧道记录</div>
  </div>
</div>

<script>
  (function(){
    // ---------- 常量 & 全局 ----------
    const DEFAULT_SECTIONS = ["入口段1", "入口段2", "过渡段1", "过渡段2", "中间段1", "中间段2", "出口段1", "出口段2"];
    const STORAGE_KEY = 'TunnelLuxPro';
    const FIXED_COLS = 7;

    let isDirty = false;
    let ignoreBeforeUnload = false;
    let autoTimer = null;
    let modalActive = false;

    const container = document.getElementById('projectsContainer');
    const captureArea = document.getElementById('captureArea');
    const toastEl = document.getElementById('toast');
    const modalOverlay = document.getElementById('saveModal');
    const backupTimeSpan = document.getElementById('backupTime');
    const backupIconSpan = document.getElementById('backupIcon');

    // 工具函数
    function showMessage(msg, duration = 1600) {
      toastEl.textContent = msg;
      toastEl.style.opacity = '1';
      setTimeout(() => toastEl.style.opacity = '0', duration);
    }

    function getNowTimeStr() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    function getCurrentDateForInput() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }

    function markDirty() {
      if (!isDirty) isDirty = true;
      if (autoTimer) clearTimeout(autoTimer);
      autoTimer = setTimeout(() => {
        saveToLocal();
        backupTimeSpan.textContent = getNowTimeStr();
        backupIconSpan.textContent = '✅';
        setTimeout(() => { if (backupIconSpan) backupIconSpan.textContent = '💾'; }, 1500);
      }, 1200);
    }

    function markClean() { isDirty = false; }

    // 持久化存储
    function saveToLocal() {
      try {
        const state = {
          tunnelName: document.getElementById('tunnelNameInput').value,
          measureTime: document.getElementById('measureTimeInput').value,
          inspector: document.getElementById('inspectorNameInput').value,
          sections: []
        };
        document.querySelectorAll('.project-card').forEach(card => {
          const sectionName = card.querySelector('.section-name-input')?.value || '区段';
          const surface = card.querySelector('.surface-select')?.value || 'asphalt';
          const rowsData = [];
          card.querySelectorAll('.data-row').forEach(row => {
            const rowVals = [];
            row.querySelectorAll('input[type="number"]').forEach(inp => rowVals.push(inp.value));
            rowsData.push(rowVals);
          });
          state.sections.push({ name: sectionName, surface, rows: rowsData });
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        markClean();
      } catch(e) { console.warn(e); }
    }

    function restoreFromLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      try {
        const state = JSON.parse(raw);
        document.getElementById('tunnelNameInput').value = state.tunnelName || '连城山隧道';
        document.getElementById('measureTimeInput').value = state.measureTime || getCurrentDateForInput();
        document.getElementById('inspectorNameInput').value = state.inspector || '张工';
        container.innerHTML = '';
        if (state.sections && state.sections.length) {
          state.sections.forEach(sec => {
            const card = buildCard(sec.name);
            container.appendChild(card);
            const surfSelect = card.querySelector('.surface-select');
            if (surfSelect) surfSelect.value = sec.surface === 'concrete' ? 'concrete' : 'asphalt';
            const rowsContainer = card.querySelector('.rows-container');
            rowsContainer.innerHTML = '';
            if (sec.rows && sec.rows.length) {
              sec.rows.forEach(rowArr => {
                const newRow = createDataRow();
                const inputs = newRow.querySelectorAll('input[type="number"]');
                rowArr.forEach((val, idx) => { if (inputs[idx]) inputs[idx].value = val; });
                rowsContainer.appendChild(newRow);
              });
            }
            if (rowsContainer.children.length === 0) rowsContainer.appendChild(createDataRow());
            updateCardAvg(card);
          });
        } else {
          buildDefaultCards();
        }
        markClean();
        showMessage('已恢复上次编辑内容');
        backupTimeSpan.textContent = '已恢复';
        return true;
      } catch(e) { return false; }
    }

    function buildDefaultCards() {
      container.innerHTML = '';
      DEFAULT_SECTIONS.forEach(name => container.appendChild(buildCard(name)));
    }

    function computeCardStats(card) {
      let sum = 0, count = 0, minVal = Infinity;
      const allInputs = card.querySelectorAll('.data-row input[type="number"]');
      allInputs.forEach(inp => {
        const v = inp.value.trim();
        if (v === '') return;
        const num = parseFloat(v);
        if (!isNaN(num) && isFinite(num)) {
          sum += num;
          count++;
          if (num < minVal) minVal = num;
        }
      });
      if (count === 0) return { avg: null, min: null, count: 0 };
      return { avg: sum / count, min: minVal, count };
    }

    function updateCardAvg(card) {
      const avgSpan = card.querySelector('.lux-avg');
      const lumSpan = card.querySelector('.lum-avg');
      const uniSpan = card.querySelector('.uni-avg');
      if (!avgSpan) return;
      const { avg, min } = computeCardStats(card);
      const surfaceType = card.querySelector('.surface-select')?.value || 'asphalt';
      const divisor = surfaceType === 'concrete' ? 10 : 15;
      const avgLux = avg !== null ? avg : null;
      avgSpan.innerHTML = avgLux !== null ? `${avgLux.toFixed(2)}<span style="font-size:0.65rem;"> lx</span>` : '<span style="opacity:0.6;">—</span>';
      if (lumSpan) {
        const brightness = avgLux !== null ? (avgLux / divisor).toFixed(2) : null;
        lumSpan.innerHTML = brightness !== null ? `${brightness}<span style="font-size:0.65rem;"> cd/m²</span>` : '<span style="opacity:0.6;">—</span>';
      }
      if (uniSpan) {
        let uniformity = null;
        if (avgLux !== null && min !== null && avgLux > 0) {
          uniformity = (min / avgLux).toFixed(3);
        }
        uniSpan.innerHTML = uniformity !== null ? `${uniformity}` : '<span style="opacity:0.6;">—</span>';
      }
    }

    function createDataRow() {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'data-row';
      const inputsWrap = document.createElement('div');
      inputsWrap.className = 'row-inputs';
      for (let i = 1; i <= FIXED_COLS; i++) {
        const cell = document.createElement('div');
        cell.className = 'input-cell';
        cell.innerHTML = `<label>点${i}</label>`;
        const inp = document.createElement('input');
        inp.type = 'number';
        inp.step = 'any';
        inp.inputMode = 'decimal';
        inp.addEventListener('input', () => {
          markDirty();
          const parentCard = rowDiv.closest('.project-card');
          if (parentCard) updateCardAvg(parentCard);
        });
        cell.appendChild(inp);
        inputsWrap.appendChild(cell);
      }
      const delBtn = document.createElement('button');
      delBtn.className = 'row-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.addEventListener('click', () => {
        const rowsContainer = rowDiv.closest('.rows-container');
        if (rowsContainer.children.length <= 1) {
          showMessage('至少保留一组测点数据', 1000);
          return;
        }
        rowDiv.remove();
        markDirty();
        const card = rowDiv.closest('.project-card');
        if (card) updateCardAvg(card);
      });
      rowDiv.appendChild(inputsWrap);
      rowDiv.appendChild(delBtn);
      return rowDiv;
    }

    function buildCard(sectionName = '新区段') {
      const card = document.createElement('div');
      card.className = 'project-card';
      const header = document.createElement('div');
      header.className = 'card-header';
      const nameInput = document.createElement('input');
      nameInput.className = 'section-name-input';
      nameInput.value = sectionName;
      nameInput.addEventListener('input', markDirty);
      
      const delSec = document.createElement('button');
      delSec.className = 'delete-section-btn';
      delSec.innerHTML = '🗑️';
      delSec.addEventListener('click', () => {
        // ★ 新增确认对话框
        if (!confirm('确定要删除这个区段吗？')) return;
        
        if (document.querySelectorAll('.project-card').length <= 1) {
          showMessage('至少保留一个区段', 1000);
          return;
        }
        card.remove();
        markDirty();
        showMessage(`区段已删除`, 800);
      });
      
      header.appendChild(nameInput);
      header.appendChild(delSec);

      const rowsContainer = document.createElement('div');
      rowsContainer.className = 'rows-container';
      rowsContainer.appendChild(createDataRow());

      const addRowBtn = document.createElement('div');
      addRowBtn.className = 'add-row-btn';
      addRowBtn.innerHTML = '+ 增加一组测点 (7点/组)';
      addRowBtn.addEventListener('click', () => {
        rowsContainer.appendChild(createDataRow());
        markDirty();
        updateCardAvg(card);
      });

      // ★ 路面材质仅显示“沥青路面”和“水泥路面”（去除括号说明，tooltip保留换算提示）
      const surfaceDiv = document.createElement('div');
      surfaceDiv.className = 'surface-selector';
      surfaceDiv.innerHTML = `<label>🛞 路面材质</label>
        <select class="surface-select">
          <option value="asphalt">沥青路面</option>
          <option value="concrete">水泥路面</option>
        </select>`;
      surfaceDiv.querySelector('select').addEventListener('change', () => { 
        markDirty(); 
        updateCardAvg(card); 
      });

      // ★ 均匀度标签改为“亮度均匀度U₀”
      const avgRow = document.createElement('div');
      avgRow.className = 'avg-row';
      avgRow.innerHTML = `
        <div class="avg-item"><span class="avg-label">📊 平均照度</span><div class="avg-value lux-avg">—</div></div>
        <div class="avg-item"><span class="avg-label">✨ 平均亮度 <span class="info-icon">ⓘ<span class="tooltip-text">沥青÷15，水泥÷10</span></span></span><div class="avg-value lum-avg">—</div></div>
        <div class="avg-item"><span class="avg-label">⚖️ 亮度均匀度U₀</span><div class="avg-value uni-avg">—</div></div>
      `;

      card.appendChild(header);
      card.appendChild(rowsContainer);
      card.appendChild(addRowBtn);
      card.appendChild(surfaceDiv);
      card.appendChild(avgRow);
      updateCardAvg(card);
      return card;
    }

    function resetToFullDefault() {
      document.getElementById('tunnelNameInput').value = '连城山隧道';
      document.getElementById('measureTimeInput').value = getCurrentDateForInput();
      document.getElementById('inspectorNameInput').value = '张工';
      buildDefaultCards();
      markClean();
      saveToLocal();
      backupTimeSpan.textContent = getNowTimeStr();
      showMessage('已恢复默认模板');
    }

    function newTunnelClean() {
      document.getElementById('tunnelNameInput').value = '新隧道';
      document.getElementById('measureTimeInput').value = getCurrentDateForInput();
      buildDefaultCards();
      markClean();
      saveToLocal();
      backupTimeSpan.textContent = getNowTimeStr();
    }

    function addSection() {
      const newName = prompt('请输入区段名称', '检测段');
      if (newName && newName.trim()) {
        container.appendChild(buildCard(newName.trim()));
        markDirty();
        showMessage(`已添加「${newName.trim()}」`);
      }
    }

    async function exportAsImage() {
      const btnImg = document.getElementById('saveImageBtn');
      btnImg.disabled = true;
      btnImg.innerHTML = '⏳ 生成中...';
      ignoreBeforeUnload = true;
      try {
        const canvas = await html2canvas(captureArea, {
          scale: 2.2,
          backgroundColor: '#f5f9fe',
          logging: false,
          useCORS: false
        });
        const tunnel = document.getElementById('tunnelNameInput').value.trim() || '隧道';
        const inspector = document.getElementById('inspectorNameInput').value.trim() || '检测员';
        const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
        const link = document.createElement('a');
        link.download = `${tunnel}_${inspector}_${timestamp}.png`;
        link.href = canvas.toDataURL();
        link.click();
        showMessage('图片已保存');
      } catch (err) {
        showMessage('截图失败，请重试');
        console.error(err);
      } finally {
        btnImg.disabled = false;
        btnImg.innerHTML = '📸 保存为图片';
        ignoreBeforeUnload = false;
      }
    }

    function exportToExcel() {
      ignoreBeforeUnload = true;
      const tunnel = document.getElementById('tunnelNameInput').value.trim() || '未命名隧道';
      const inspector = document.getElementById('inspectorNameInput').value.trim() || '未填写';
      const measureTime = document.getElementById('measureTimeInput').value.trim() || getCurrentDateForInput();
      const cards = document.querySelectorAll('.project-card');
      const excelRows = [];
      excelRows.push([`${tunnel} 照度检测报告`]);
      excelRows.push([`检测时间: ${measureTime}   检测人: ${inspector}`]);
      excelRows.push([]);
      
      // ★ 表头也改为“亮度均匀度U₀”
      const headers = ['区段名称', '路面类型'];
      for (let i = 1; i <= FIXED_COLS; i++) headers.push(`测点${i}`);
      headers.push('总平均照度(lx)', '平均亮度(cd/m²)', '亮度均匀度U₀');
      excelRows.push(headers);
      
      cards.forEach(card => {
        const secName = card.querySelector('.section-name-input')?.value || '—';
        const surfaceType = card.querySelector('.surface-select')?.value === 'concrete' ? '水泥路面' : '沥青路面';
        const { avg, min } = computeCardStats(card);
        const avgLuxVal = avg !== null ? avg.toFixed(2) : '';
        const divisor = card.querySelector('.surface-select')?.value === 'concrete' ? 10 : 15;
        const brightness = avg !== null ? (avg / divisor).toFixed(2) : '';
        const uniformity = (avg !== null && min !== null && avg > 0) ? (min / avg).toFixed(4) : '';
        const rowsGroup = card.querySelectorAll('.data-row');
        rowsGroup.forEach((row, idx) => {
          const rowCells = [secName, surfaceType];
          const inputs = row.querySelectorAll('input[type="number"]');
          for (let i = 0; i < FIXED_COLS; i++) {
            rowCells.push(i < inputs.length ? (inputs[i].value || '') : '');
          }
          if (idx === 0) {
            rowCells.push(avgLuxVal, brightness, uniformity);
          } else {
            rowCells.push('', '', '');
          }
          excelRows.push(rowCells);
        });
      });
      const ws = XLSX.utils.aoa_to_sheet(excelRows);
      ws['!cols'] = [{wch:14},{wch:12}, ...Array(FIXED_COLS).fill({wch:8}), {wch:13},{wch:13},{wch:10}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '照度数据');
      const safeTime = measureTime.replace(/[: ]/g, '-');
      XLSX.writeFile(wb, `${tunnel}_${inspector}_${safeTime}.xlsx`);
      ignoreBeforeUnload = false;
      showMessage('Excel 导出成功');
    }

    function showSaveModal() {
      if (modalActive) return;
      modalActive = true;
      modalOverlay.style.display = 'flex';
      const excelBtn = document.getElementById('modalExcelBtn');
      const imgBtn = document.getElementById('modalImageBtn');
      const allBtn = document.getElementById('modalAllBtn');
      const skipBtn = document.getElementById('modalSkipBtn');
      const cancelBtn = document.getElementById('modalCancelBtn');
      
      const closeModal = () => {
        modalOverlay.style.display = 'none';
        modalActive = false;
      };
      const newHandler = (fn) => {
        closeModal();
        fn();
        newTunnelClean();
      };
      const newWithSave = async (action) => {
        closeModal();
        await action();
        newTunnelClean();
      };
      
      const clickExcel = () => newHandler(exportToExcel);
      const clickImg = () => newWithSave(exportAsImage);
      const clickAll = () => newWithSave(async () => { exportToExcel(); await exportAsImage(); });
      const clickSkip = () => { closeModal(); newTunnelClean(); };
      const clickCancel = () => closeModal();
      
      excelBtn.replaceWith(excelBtn.cloneNode(true));
      imgBtn.replaceWith(imgBtn.cloneNode(true));
      allBtn.replaceWith(allBtn.cloneNode(true));
      skipBtn.replaceWith(skipBtn.cloneNode(true));
      cancelBtn.replaceWith(cancelBtn.cloneNode(true));
      
      document.getElementById('modalExcelBtn').addEventListener('click', clickExcel);
      document.getElementById('modalImageBtn').addEventListener('click', clickImg);
      document.getElementById('modalAllBtn').addEventListener('click', clickAll);
      document.getElementById('modalSkipBtn').addEventListener('click', clickSkip);
      document.getElementById('modalCancelBtn').addEventListener('click', clickCancel);
      
      modalOverlay.onclick = (e) => { if (e.target === modalOverlay) closeModal(); };
    }

    setInterval(() => { if (isDirty) saveToLocal(); }, 25000);
    window.addEventListener('beforeunload', (e) => {
      if (isDirty && !ignoreBeforeUnload) {
        saveToLocal();
        e.preventDefault();
        e.returnValue = '';
      }
    });

    document.getElementById('addSectionBtn').addEventListener('click', addSection);
    document.getElementById('resetDefaultBtn').addEventListener('click', () => {
      if (confirm('恢复默认将会清除当前所有未保存的修改，确定吗？')) resetToFullDefault();
    });
    document.getElementById('saveImageBtn').addEventListener('click', exportAsImage);
    document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
    document.getElementById('newTunnelBtn').addEventListener('click', showSaveModal);
    document.getElementById('tunnelNameInput').addEventListener('input', markDirty);
    document.getElementById('measureTimeInput').addEventListener('input', markDirty);
    document.getElementById('inspectorNameInput').addEventListener('input', markDirty);

    if (!restoreFromLocal()) {
      buildDefaultCards();
      backupTimeSpan.textContent = getNowTimeStr();
    }
    if (/MicroMessenger/i.test(navigator.userAgent)) {
      document.getElementById('wechatWarning').classList.add('show');
    }
  })();
</script>
</body>
</html>
